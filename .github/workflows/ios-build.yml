name: iOS Build
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ./ios
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Clean stale Xcode project
        run: rm -rf FlowLingo.xcodeproj
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml
      - name: Show schemes
        run: xcodebuild -list -project FlowLingo.xcodeproj
      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project FlowLingo.xcodeproj \
            -scheme FlowLingo \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
